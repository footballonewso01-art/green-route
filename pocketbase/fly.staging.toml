# fly.staging.toml app configuration file
#

app = 'greenroute-pb-staging'
primary_region = 'ams'

[[mounts]]
  source = 'pb_data_staging'
  destination = '/pb/pb_data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
